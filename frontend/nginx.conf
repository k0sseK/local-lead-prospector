# Blok przekierowujący z www na główną domenę (wymusza HTTPS)
server {
    listen 80;
    server_name www.znajdzfirmy.pl;
    
    return 301 https://znajdzfirmy.pl$request_uri;
}

# Główny blok obsługujący aplikację
server {
    listen 80;
    server_name znajdzfirmy.pl localhost;

    absolute_redirect off;
    port_in_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Serve Vue SPA — all unknown routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression for static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
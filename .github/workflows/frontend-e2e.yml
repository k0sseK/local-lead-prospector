name: Frontend E2E Tests (Playwright)

# ── Triggers ──────────────────────────────────────────────────────────────────
# E2E tests need a real backend + real API keys – expensive and slow.
# Strategy:
#   • push to main        → run automatically (catches regressions before Railway deploys)
#   • pull_request        → run automatically (catches regressions in PRs)
#   • workflow_dispatch   → manual trigger with optional URL override
#     (useful for smoke-testing a Railway preview environment)
on:
    push:
        branches: ["main"]
        paths:
            - "frontend/**"
            - "backend/**"
            - ".github/workflows/frontend-e2e.yml"
    pull_request:
        branches: ["main"]
        paths:
            - "frontend/**"
            - "backend/**"
            - ".github/workflows/frontend-e2e.yml"
    workflow_dispatch:
        inputs:
            target_url:
                description: "Override baseURL (e.g. Railway preview URL)"
                required: false
                default: "http://localhost:3000"

jobs:
    playwright:
        name: Playwright E2E
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            # 1. Checkout
            - name: Checkout code
              uses: actions/checkout@v4

            # ── Backend setup ──────────────────────────────────────────────────────

            # 2. Python for FastAPI
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
                  cache: "pip"
                  cache-dependency-path: backend/requirements.txt

            # 3. Install backend deps
            - name: Install backend dependencies
              working-directory: backend
              run: pip install -r requirements.txt

            # 4. Start FastAPI backend in background
            - name: Start FastAPI backend
              working-directory: backend
              env:
                  # SQLite for CI – no PostgreSQL service needed
                  DATABASE_URL: "sqlite:///./ci_test.db"
                  SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-secret-not-for-production' }}
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                  GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
                  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
                  RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
              run: |
                  uvicorn app.main:app --host 0.0.0.0 --port 8000 &
                  echo "Waiting for backend to be ready..."
                  for i in $(seq 1 20); do
                    curl -sf http://localhost:8000/health && echo "Backend ready" && break || sleep 2
                  done

            # ── Frontend setup ─────────────────────────────────────────────────────

            # 5. pnpm
            - name: Set up pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 9

            # 6. Node
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"
                  cache-dependency-path: frontend/pnpm-lock.yaml

            # 7. Install frontend deps
            - name: Install frontend dependencies
              working-directory: frontend
              run: pnpm install

            # 8. Install Playwright browsers (Chromium only, cached)
            - name: Cache Playwright browsers
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}

            - name: Install Playwright Chromium
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              working-directory: frontend
              run: pnpm exec playwright install chromium --with-deps

            - name: Install Playwright system deps only (cache hit)
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              working-directory: frontend
              run: pnpm exec playwright install-deps chromium

            # 9. Build Nuxt for production (SSR → generates .output/server/index.mjs)
            - name: Build Nuxt
              working-directory: frontend
              env:
                  NUXT_PUBLIC_API_BASE: "http://localhost:8000/api"
                  NUXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NUXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
              run: pnpm build

            # 10. Start Nuxt SSR server (nuxt build produces a Node server, not static files)
            - name: Start Nuxt preview server
              working-directory: frontend
              env:
                  PORT: "3000"
                  NUXT_PUBLIC_API_BASE: "http://localhost:8000/api"
              run: |
                  node .output/server/index.mjs &
                  echo "Waiting for Nuxt to be ready..."
                  for i in $(seq 1 15); do
                    curl -sf http://localhost:3000 && break || sleep 2
                  done

            # 11. Seed test user account (idempotent – safe to run every time)
            - name: Seed E2E test account
              run: |
                  curl -sf -X POST http://localhost:8000/api/auth/register \
                    -H "Content-Type: application/json" \
                    -d '{"email":"${{ secrets.E2E_TEST_EMAIL }}","password":"${{ secrets.E2E_TEST_PASSWORD }}"}' \
                    || echo "User may already exist – continuing"

            # 11b. Ensure seeded account is verified (login endpoint requires is_verified=true)
            - name: Verify E2E test account in CI DB
              working-directory: backend
              env:
                  E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
              run: |
                  python - <<'PY'
                  import sqlite3
                  import os

                  email = os.environ["E2E_TEST_EMAIL"]
                  conn = sqlite3.connect("ci_test.db")
                  cur = conn.cursor()
                  cur.execute(
                    """
                    UPDATE users
                    SET is_verified = 1,
                      verification_token = NULL
                    WHERE email = ?
                    """,
                    (email,),
                  )
                  if cur.rowcount == 0:
                    raise SystemExit(f"E2E user not found in DB: {email}")
                  conn.commit()
                  conn.close()
                  print(f"Verified E2E user: {email}")
                  PY

            # 12. Run Playwright tests
            - name: Run Playwright E2E tests
              working-directory: frontend
              env:
                  PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.target_url || 'http://localhost:3000' }}
                  E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
                  E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
                  CI: "true"
              run: pnpm test:e2e

            # 13. Upload artifacts on failure
            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-report
                  path: |
                      frontend/playwright-report/
                      frontend/test-results/
                  retention-days: 7

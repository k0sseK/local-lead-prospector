services:
    # ── PostgreSQL Database ──────────────────────────────────────────────────
    db:
        image: postgres:15-alpine
        container_name: llp-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: llp_user
            POSTGRES_PASSWORD: llp_password
            POSTGRES_DB: llp_db
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U llp_user -d llp_db"]
            interval: 10s
            timeout: 5s
            retries: 5

    # ── Backend (FastAPI + Uvicorn) ──────────────────────────────────────────
    backend:
        image: llp-backend-img:latest
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: llp-backend
        restart: unless-stopped
        ports:
            - "8000:8000"
        env_file:
            - ./backend/.env
        environment:
            - DATABASE_URL=postgresql://llp_user:llp_password@db:5432/llp_db
            - PLAYWRIGHT_SERVICE_URL=http://playwright-service:8001
            - PLAYWRIGHT_API_SECRET=change-this-internal-secret
            - TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA
        depends_on:
            db:
                condition: service_healthy
        networks:
            - app-network

    # ── Playwright Scraper (headless Chromium for SPA sites) ─────────────────
    playwright-service:
        image: llp-playwright-img:latest
        build:
            context: ./playwright-service
            dockerfile: Dockerfile
        container_name: llp-playwright
        restart: unless-stopped
        ports:
            - "8001:8001"
        environment:
            - API_SECRET=change-this-internal-secret
        networks:
            - app-network

    # ── Frontend (Vue 3 + Nginx) ─────────────────────────────────────────────
    frontend:
        image: llp-frontend-img:latest
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                - NUXT_PUBLIC_TURNSTILE_SITE_KEY=${NUXT_PUBLIC_TURNSTILE_SITE_KEY}
                - NUXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NUXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        container_name: llp-frontend
        restart: unless-stopped
        ports:
            - "80:80"
        depends_on:
            - backend
        networks:
            - app-network

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
    postgres_data:
        name: llp-postgres-data

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
    app-network:
        driver: bridge
